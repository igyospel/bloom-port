    <!-- Monetag Rewarded Interstitial -->
    <script>
      // Register Monetag service worker for push / rewarded ads
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' });
      }

      // Monetag show() — will be called from React when user clicks "Watch Ad"
      window.monetagShowAd = function() {
        return new Promise(function(resolve) {
          // showBanner is injected by Monetag after their script loads
          if (typeof window.show === 'function') {
            window.show(11052024, { autoReload: false })
              .then(function(result) { resolve(result); })
              .catch(function()    { resolve('error'); });
          } else {
            resolve('unavailable');
          }
        });
